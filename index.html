<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Mashrur Ahsan — portfolio. Selected work, deep dives, and the stuff I build." />

    <!-- Open Graph (LinkedIn, Facebook, Slack) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://goonermak.github.io/" />
    <meta property="og:title" content="Mashrur Ahsan — Portfolio" />
    <meta property="og:description" content="Selected work, deep dives, and the stuff I build." />
    <!-- og:image must be an absolute URL to a raster file (PNG/JPG, 1200x630). LinkedIn ignores SVG. -->
    <meta property="og:image" content="https://goonermak.github.io/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Mashrur Ahsan — Portfolio" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mashrur Ahsan — Portfolio" />
    <meta name="twitter:description" content="Selected work, deep dives, and the stuff I build." />
    <meta name="twitter:image" content="https://goonermak.github.io/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Portfolio // Mashrur Ahsan</title>
  </head>
